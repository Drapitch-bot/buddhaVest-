<title>BuddhaVest · Maintenance</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d0d14;
    color: #e8e6ff;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }
  .container { text-align: center; max-width: 440px; width: 100%; }
  .monk {
    width: 200px;
    height: auto;
    margin: 0 auto 1.2rem;
    display: block;
  }
  .brand { font-size: 26px; font-weight: 600; color: #c4bfff; margin-bottom: 1.8rem; letter-spacing: 0.5px; }
  .card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(196,191,255,0.15);
    border-radius: 20px;
    padding: 2rem 1.8rem;
  }
  .title { font-size: 20px; font-weight: 600; color: #e8e6ff; margin-bottom: 0.7rem; }
  .subtitle { font-size: 14px; color: rgba(232,230,255,0.6); line-height: 1.75; margin-bottom: 1.4rem; }
  .divider { height: 1px; background: rgba(196,191,255,0.12); margin: 1.2rem 0; }
  .tagline { font-size: 12px; color: rgba(232,230,255,0.35); letter-spacing: 0.3px; }
  .dots-row { margin-top: 1rem; display: flex; justify-content: center; align-items: center; gap: 10px; }
  .dot { width: 7px; height: 7px; background: #7c6ff7; border-radius: 50%; animation: pulse 1.5s ease-in-out infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse { 0%,100% { opacity:0.3; transform:scale(0.8); } 50% { opacity:1; transform:scale(1.2); } }
</style>
